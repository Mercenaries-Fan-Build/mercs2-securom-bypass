name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          # Pinned to match the modkit's Linux build floor (it builds on
          # ubuntu-22.04 / glibc 2.35). The modkit downloads and runs this binary,
          # so building on a newer image would raise the glibc requirement above
          # what the modkit supports and fail with "GLIBC_2.xx not found".
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            suffix: "-linux-x86_64"
          - os: ubuntu-22.04
            target: i686-unknown-linux-gnu
            suffix: "-linux-i686"
          - os: windows-latest
            target: i686-pc-windows-msvc
            suffix: "-windows-i686.exe"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: "-windows-x86_64.exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install 32-bit Linux toolchain
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/apply_crack.exe apply_crack${{ matrix.suffix }}
          else
            cp target/${{ matrix.target }}/release/apply_crack apply_crack${{ matrix.suffix }}
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: apply_crack${{ matrix.suffix }}
